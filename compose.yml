services:

  database:
    image: postgres:17
    container_name: software-project-template-database
    environment:
      POSTGRES_DB: software_project_template
      POSTGRES_USER: software_project_template
      POSTGRES_PASSWORD: software_project_template
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U software_project_template -d software_project_template"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - database_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: software-project-template-backend
    depends_on:
      database:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /backend
          ignore:
            - .venv/
            - __pycache__/
            - .pytest_cache/
            - .ruff_cache/
            - .mypy_cache/
        - action: rebuild
          path: ./backend/uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: software-project-template-frontend
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /frontend
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

volumes:
  database_data:
