services:

  database:
    image: mongo:8
    container_name: project-template-database
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/data/db

  redis:
    image: redis:7
    container_name: project-template-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-template-backend
    depends_on:
      database:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "${API_HOST:-0.0.0.0}", "--port", "${PORT:-8000}", "--reload"]
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./backend/uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: project-template-frontend
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

volumes:
  database_data:
